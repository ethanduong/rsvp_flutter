name: CI/CD Deployment Orchestrator

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-push:
    name: Native Containerization Compilation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code Pipeline
        uses: actions/checkout@v4

      - name: Authenticate GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Multi-Stage Flutter & Dart Build 
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/rsvp_flutter:latest

  deploy-to-gcp:
    name: Google Compute Engine Remote Execution
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Stream SSH Instructions to Virtual Machine
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            sudo docker pull ghcr.io/${{ github.repository_owner }}/rsvp_flutter:latest
            sudo docker stop wedding_server || true
            sudo docker rm wedding_server || true
            sudo docker run -d --name wedding_server --restart unless-stopped -p 80:8080 -v /var/rsvp_data:/data -e CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }} -e CF_DB_ID=${{ secrets.CF_DB_ID }} -e CF_API_TOKEN=${{ secrets.CF_API_TOKEN }} ghcr.io/${{ github.repository_owner }}/rsvp_flutter:latest
